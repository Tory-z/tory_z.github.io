<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>欢迎来到我的个人网站</h1>
            <nav>
                <ul>
                    <li><a href="#home">首页</a></li>
                    <li><a href="#about">关于我</a></li>
                    <li><a href="#projects">项目</a></li>
                    <li><a href="#contact">联系我</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="container">
                <h2>你好，我是前端小白</h2>
                <p>这是我的个人网站，正在学习前端开发！</p>
                <button id="greeting-btn">点击打招呼</button>
            </div>
        </section>

        <section id="about">
            <div class="container">
                <h2>关于我</h2>
                <div class="about-content">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20portrait%20photo%20of%20a%20young%20developer%20with%20laptop&image_size=square" alt="我的照片" class="profile-img">
                    <p>我是一名正在学习前端开发的小白，热爱编程和技术。通过这个网站，我希望分享我的学习历程和项目经验。</p>
                </div>
            </div>
        </section>

        <section id="projects">
            <div class="container">
                <h2>我的项目</h2>
                <div class="projects-grid">
                    <div class="project-card">
                        <h3>项目一</h3>
                        <p>这是我的第一个项目</p>
                    </div>
                    <div class="project-card">
                        <h3>项目二</h3>
                        <p>这是我的第二个项目</p>
                    </div>
                    <div class="project-card">
                        <h3>项目三</h3>
                        <p>这是我的第三个项目</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="contact">
            <div class="container">
                <h2>联系我</h2>
                <form id="contact-form">
                    <input type="text" placeholder="你的名字" required>
                    <input type="email" placeholder="你的邮箱" required>
                    <textarea placeholder="留言内容" required></textarea>
                    <button type="submit">发送</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 我的个人网站 | 使用 GitHub Pages 托管</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
